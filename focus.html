<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
        }

        .form-box {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 2px solid gray;
            border-radius: 5px;
        }

        /* focus pseudo-class */
        input:focus {
            border-color: blue;
            background-color: #eef;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }
    </style>
</head>

<body>

    <div class="form-box">
        <h2>Register</h2>

        <form>
            <input type="text" placeholder="Username">

            <input type="email" placeholder="Email">

            <input type="password" placeholder="Password">

            <button type="submit">Sign In</button>
        </form>
    </div>

</body>
</html>
