<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opacity Bars</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    .bar{
      flex:1;
      background:red;
    }

    .bar1{ opacity:0.2; }
    .bar2{ opacity:0.4; }
    .bar3{ opacity:0.6; }
    .bar4{ opacity:0.8; }
    .bar5{ opacity:1; }
  </style>
</head>

<body>
  <div class="bar bar1"></div>
  <div class="bar bar2"></div>
  <div class="bar bar3"></div>
  <div class="bar bar4"></div>
  <div class="bar bar5"></div>
</body>
</html>
